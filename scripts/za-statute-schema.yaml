type: object
required: [statute, authority, last_confirmed, source_url, sections]
properties:
  statute:
    type: string
    minLength: 5
  authority:
    type: string
    minLength: 3
  last_confirmed:
    type: string
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"
  source_url:
    type: string
    pattern: "^https?://"
  sections:
    type: object
    minProperties: 1
    additionalProperties:
      type: object
      required: [ref, value, effective_from, effective_until, effect]
      properties:
        ref:
          type: string
        value:
          oneOf:
            - type: number
            - type: string
        currency:
          type: string
          enum: [ZAR]
        unit:
          type: string
        effective_from:
          oneOf:
            - type: string
              pattern: "^\\d{4}-\\d{2}-\\d{2}$"
            - type: "null"
        effective_until:
          oneOf:
            - type: string
              pattern: "^\\d{4}-\\d{2}-\\d{2}$"
            - type: "null"
        effect:
          type: string
          minLength: 5
        gazette_date:
          oneOf:
            - type: string
              pattern: "^\\d{4}-\\d{2}-\\d{2}$"
            - type: "null"
        note:
          type: string
